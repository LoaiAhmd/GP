# =====================================================================
# 4. SECURITY-MONITORING NAMESPACE
# =====================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: controller-admin-sa
  namespace: security-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: controller-admin-binding
subjects:
- kind: ServiceAccount
  name: controller-admin-sa
  namespace: security-monitoring
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---

# A. AI Threat Detector (via KServe InferenceService)
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: ai-threat-detector
  namespace: security-monitoring
spec:
  predictor:
    containers:
    - name: kserve-container
      image: gomgma/kube-detect-model:v1.1
      ports:
        - containerPort: 8080
          protocol: TCP
---

# B. Automation Pipeline Controller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defense-automation-controller
  namespace: security-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-controller
  template:
    metadata:
      labels:
        app: pipeline-controller
    spec:
      serviceAccountName: controller-admin-sa
      hostNetwork: true
      containers:
      - name: automation-controller
        image: ziadhafez/controller:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
---

# C. Live Streamlit Dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: defense-dashboard
  namespace: security-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: controller-admin-sa
      containers:
      - name: dashboard-container
        image: ziadhafez/dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: security-monitoring
spec:
  selector:
    app: dashboard
  type: NodePort
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 8501
---

