# =====================================================================
# 1. Namespaces
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: core-app
---
apiVersion: v1
kind: Namespace
metadata:
  name: security-monitoring
---
apiVersion: v1
kind: Namespace
metadata:
  name: deception-workspace
---

# =====================================================================
# 2. CORE-APP NAMESPACE: Databases
# =====================================================================

# A. Order DB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: core-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
      - name: order-db
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: orderdb
        - name: POSTGRES_USER
          value: user
        - name: POSTGRES_PASSWORD
          value: password
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: core-app
spec:
  selector:
    app: order-db
  ports:
    - port: 5432
      targetPort: 5432
---

